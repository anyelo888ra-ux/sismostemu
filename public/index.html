<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sismos Recientes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial; background: #111; color: #fff; margin: 0; }
    h1 { text-align: center; padding: 20px; }
    #map { height: 400px; margin: 20px; border-radius: 10px; }
    table { width: 90%; margin: auto; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #444; }
    tr:hover { background: #222; }
  </style>
</head>
<body>

<h1>Sismos recientes cerca de Venezuela</h1>

<div id="map"></div>

<table id="tabla"></table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
async function cargar() {
  const res = await fetch("/sismos");
  const data = await res.json();

  // Tabla
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "<tr><th>Lugar</th><th>Magnitud</th><th>Fecha</th></tr>";

  data.forEach(s => {
    tabla.innerHTML += `<tr>
      <td>${s.lugar}</td>
      <td>${s.magnitud}</td>
      <td>${s.tiempo}</td>
    </tr>`;
  });

  // Mapa
  const map = L.map('map').setView([8, -66], 5);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
  }).addTo(map);

  data.forEach(s => {
    const match = s.lugar.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
    if (!match) return;

    const lat = parseFloat(match[1]);
    const lon = parseFloat(match[2]);

    L.marker([lat, lon]).addTo(map)
      .bindPopup(`<b>${s.lugar}</b><br>Magnitud: ${s.magnitud}`);
  });
}

cargar();
</script>

</body>
</html>
