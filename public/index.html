<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sismos Recientes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial; background: #111; color: #fff; margin: 0; }
    h1 { text-align: center; padding: 20px; }
    #map { height: 400px; margin: 20px; border-radius: 10px; }
    table { width: 90%; margin: auto; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #444; }
    tr:hover { background: #222; }

    /* Verity Support */
    #verity-box {
      width: 90%;
      margin: 40px auto;
      background: #151515;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #333;
    }
    #verity-box input, #verity-box button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background: #222;
      color: #fff;
    }
    #verity-box button {
      background: #333;
      cursor: pointer;
    }
    #respuesta {
      margin-top: 20px;
      padding: 15px;
      background: #111;
      border-radius: 5px;
      border: 1px solid #333;
      min-height: 50px;
    }
  </style>
</head>
<body>

<h1>Sismos recientes cerca de Venezuela</h1>

<div id="map"></div>

<table id="tabla"></table>

<!-- SOPORTE VERITY -->
<div id="verity-box">
  <h2>Verity Support System</h2>
  <p>Escribe tu consulta:</p>

  <input id="pregunta" type="text" placeholder="¿Qué deseas analizar?">
  <button onclick="procesar()">Enviar</button>

  <div id="respuesta"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
async function cargar() {
  const res = await fetch("/sismos");
  const data = await res.json();

  // Tabla
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "<tr><th>Lugar</th><th>Magnitud</th><th>Fecha</th></tr>";

  data.forEach(s => {
    tabla.innerHTML += `<tr>
      <td>${s.lugar}</td>
      <td>${s.magnitud}</td>
      <td>${s.tiempo}</td>
    </tr>`;
  });

  // Mapa
  const map = L.map('map').setView([8, -66], 5);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
  }).addTo(map);

  data.forEach(s => {
    if (!s.lat || !s.lon) return;

    L.marker([s.lat, s.lon]).addTo(map)
      .bindPopup(`<b>${s.lugar}</b><br>Magnitud: ${s.magnitud}`);
  });
}

cargar();

// VERITY SUPPORT LOGIC
function procesar() {
  let p = document.getElementById("pregunta").value.toLowerCase();
  let r = "";

  if (p.length < 3) {
      r = "Datos insuficientes.";
  } else if (p.includes("error") || p.includes("fallo")) {
      r = "Anomalía detectada en tu reporte.";
  } else if (p.includes("sismo") || p.includes("temblor")) {
      r = "Actividad sísmica analizada. No representa amenaza significativa.";
  } else if (p.includes("hola") || p.includes("hey")) {
      r = "Movimiento detectado. Procesando tu señal.";
  } else if (p.includes("quien eres") || p.includes("nombre")) {
      r = "Soy Verity. No un nombre… una función.";
  } else {
      r = "Consulta procesada.";
  }

  document.getElementById("respuesta").innerText = r;
}
</script>

</body>
</html>
